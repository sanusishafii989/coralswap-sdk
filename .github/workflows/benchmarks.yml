name: Benchmark Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  BENCHMARK_RPC_LATENCY_MS: 5
  BENCHMARK_ITERATIONS: 50
  BENCHMARK_VARIANCE_TARGET: 10

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run benchmarks
        run: npm run benchmark -- --output benchmarks/results.json

      - name: Upload PR results artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-pr-${{ github.event.number }}
          path: benchmarks/results.json

      - name: Upload baseline artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: benchmarks/results.json
          overwrite: true

      - name: Download baseline artifact
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-baseline
          path: benchmarks/baseline

      - name: Compare against baseline
        id: compare
        if: github.event_name == 'pull_request'
        run: |
          BASELINE="benchmarks/baseline/results.json"
          PR_RESULTS="benchmarks/results.json"
          REPORT="benchmarks/regression-report.md"

          if [ ! -f "$BASELINE" ]; then
            echo "No baseline found — skipping comparison."
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_baseline=true" >> "$GITHUB_OUTPUT"

          cat > "$REPORT" << 'REPORT_HEADER'
          # Benchmark Regression Report

          | Operation | Baseline (ms) | PR (ms) | Change | Verdict |
          |-----------|--------------|---------|--------|---------|
          REPORT_HEADER

          any_failure=false
          any_warning=false
          BASELINE_COUNT=$(jq '.results | length' "$BASELINE")

          for i in $(seq 0 $((BASELINE_COUNT - 1))); do
            NAME=$(jq -r ".results[$i].name" "$BASELINE")
            BASELINE_AVG=$(jq ".results[$i].avg_latency_ms" "$BASELINE")

            PR_AVG=$(jq -r ".results[] | select(.name == \"$NAME\") | .avg_latency_ms" "$PR_RESULTS")

            if [ -z "$PR_AVG" ] || [ "$PR_AVG" = "null" ]; then
              echo "| $NAME | $BASELINE_AVG | N/A | N/A | ⚠️ Missing |" >> "$REPORT"
              continue
            fi

            if [ "$(echo "$BASELINE_AVG == 0" | bc -l)" -eq 1 ]; then
              echo "| $NAME | $BASELINE_AVG | $PR_AVG | N/A | ✅ Zero baseline |" >> "$REPORT"
              continue
            fi

            CHANGE_PCT=$(echo "scale=6; ($PR_AVG - $BASELINE_AVG) / $BASELINE_AVG * 100" | bc -l)
            CHANGE_PCT=$(printf "%.2f" "$CHANGE_PCT")

            if [ "$(echo "$CHANGE_PCT > 50" | bc -l)" -eq 1 ]; then
              VERDICT="❌ Failure (>50%)"
              any_failure=true
            elif [ "$(echo "$CHANGE_PCT > 20" | bc -l)" -eq 1 ]; then
              VERDICT="⚠️ Warning (>20%)"
              any_warning=true
            elif [ "$(echo "$CHANGE_PCT < -5" | bc -l)" -eq 1 ]; then
              VERDICT="✅ Improvement"
            else
              VERDICT="✅"
            fi

            echo "| $NAME | $BASELINE_AVG | $PR_AVG | $CHANGE_PCT% | $VERDICT |" >> "$REPORT"
          done

          echo "" >> "$REPORT"
          echo "**Thresholds:** ⚠️ Warning > 20% | ❌ Failure > 50%" >> "$REPORT"
          echo "" >> "$REPORT"

          if [ "$any_failure" = "true" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ **FAILURE**: One or more operations regressed by more than 50%." >> "$REPORT"
          elif [ "$any_warning" = "true" ]; then
            echo "result=warning" >> "$GITHUB_OUTPUT"
            echo "⚠️ **WARNING**: One or more operations regressed by more than 20%." >> "$REPORT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "✅ **PASS**: No significant regressions detected." >> "$REPORT"
          fi

      - name: Upload regression report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression-report-pr-${{ github.event.number }}
          path: benchmarks/regression-report.md

      - name: Comment PR
        if: github.event_name == 'pull_request' && steps.compare.outputs.has_baseline == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('benchmarks/regression-report.md', 'utf8');
            const result = process.env.RESULT;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Benchmark Regression Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report,
              });
            }
        env:
          RESULT: ${{ steps.compare.outputs.result }}

      - name: Fail on critical regression
        if: github.event_name == 'pull_request' && steps.compare.outputs.result == 'failure'
        run: |
          echo "❌ Critical benchmark regression detected (>50%)."
          echo "Check the PR comment or regression report artifact for details."
          exit 1
