name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Determine version bump
        id: version
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LAST_TAG}..HEAD")
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"

          BUMP="none"
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Bump version & tag
        id: bump
        if: steps.version.outputs.bump != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VERSION=$(npm version ${{ steps.version.outputs.bump }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          git add package.json package-lock.json
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag "${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Generate changelog
        if: steps.version.outputs.bump != 'none'
        run: |
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD^)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${LAST_TAG}..HEAD^")
          fi

          ENTRY="## ${NEW_VERSION} (${DATE})\n\n${COMMITS}\n"

          # Prepend new entry after the first line (title)
          awk -v entry="$ENTRY" 'NR==1{print; print ""; print entry; next}1' CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${NEW_VERSION} [skip ci]"
          git push origin main

      - name: Build
        if: steps.version.outputs.bump != 'none'
        run: npm run build

      - name: Publish to npm
        if: steps.version.outputs.bump != 'none'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD^)
          else
            NOTES=$(git log --pretty=format:"- %s" "${LAST_TAG}..HEAD^")
          fi

          gh release create "${NEW_VERSION}" \
            --title "${NEW_VERSION}" \
            --notes "$NOTES"
